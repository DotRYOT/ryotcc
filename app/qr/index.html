<!DOCTYPE html>
<html lang="en">
  <head>
    <title>RYOT.CC QR Generator</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <link rel="shortcut icon" href="./assets/img/qr-code.svg" type="image/x-icon">
    <script type="text/javascript" src="jquery.min.js"></script>
    <script type="text/javascript" src="qrcode.js"></script>
    <style>
      :root {
        color-scheme: dark;
        color: #e9eef7;
        background: #06070d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, rgba(93, 145, 255, 0.14), transparent 24%),
          linear-gradient(180deg, #07090f 0%, #0d1119 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        padding: 24px;
      }

      .qr-card {
        width: min(100%, 420px);
        padding: 2rem;
        border-radius: 28px;
        background: rgba(8, 11, 18, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
        display: grid;
        gap: 1.5rem;
      }

      .qr-card h1 {
        margin: 0;
        font-size: clamp(1.7rem, 2.3vw, 2.4rem);
        letter-spacing: -0.04em;
      }

      .qr-card p {
        margin: 0;
        color: #a3b4d8;
        line-height: 1.65;
      }

      #text {
        width: 100%;
        padding: 1rem 1.1rem;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: #eff3ff;
        outline: none;
        font-size: 1rem;
        transition: border-color 0.2s ease, box-shadow 0.2s ease,
          background-color 0.2s ease;
      }

      #text::selection {
        background: rgba(93, 145, 255, 0.32);
      }

      #text:focus {
        border-color: rgba(93, 145, 255, 0.65);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px rgba(93, 145, 255, 0.12);
      }

      #qrcode {
        width: 220px;
        height: 220px;
        margin: 0 auto;
        padding: 1rem;
        border-radius: 26px;
        background: #070a14;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .footer {
        margin: 0;
        color: #7c89b7;
        text-align: center;
        font-size: 0.95rem;
      }

      @media (max-width: 480px) {
        .qr-card {
          padding: 1.4rem;
        }

        #qrcode {
          width: 180px;
          height: 180px;
        }
      }
    </style>
  </head>
  <body>
    <div class="qr-card">
      <div>
        <h1>QR Code Generator</h1>
        <p>Paste any link or text below to generate a scannable QR code instantly.</p>
      </div>
      <input
        id="text"
        type="text"
        value="https://ryot.cc/qr/"
        autocomplete="off"
      />
      <div id="qrcode"></div>
      <p class="footer">Press Enter or click outside the field to refresh the QR code.</p>
    </div>

    <script type="text/javascript">
      var qrcode = new QRCode(document.getElementById("qrcode"), {
        width: 180,
        height: 180,
      });

      function makeCode() {
        var elText = document.getElementById("text");

        if (!elText.value) {
          alert("Input a text");
          elText.focus();
          return;
        }

        qrcode.makeCode(elText.value);
      }

      makeCode();

      $("#text")
        .on("blur", function () {
          makeCode();
        })
        .on("keydown", function (e) {
          if (e.keyCode == 13) {
            makeCode();
          }
        });
    </script>
  </body>
</html>
