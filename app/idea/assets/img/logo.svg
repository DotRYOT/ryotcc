<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Idea Board logo">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f766e"/>

  <!-- Column headers (muted bars) -->
  <rect x="3.5"  y="4"   width="7.5" height="2.5" rx="1"   fill="rgba(255,255,255,0.38)"/>
  <rect x="12.5" y="4"   width="7"   height="2.5" rx="1"   fill="rgba(255,255,255,0.38)"/>
  <rect x="21"   y="4"   width="7.5" height="2.5" rx="1"   fill="rgba(255,255,255,0.38)"/>

  <!-- Column 1 — two cards (To Do) -->
  <rect x="3.5"  y="8"   width="7.5" height="5.5" rx="1.5" fill="white"/>
  <rect x="3.5"  y="15"  width="7.5" height="5.5" rx="1.5" fill="rgba(255,255,255,0.6)"/>

  <!-- Column 2 — one card (In Progress) -->
  <rect x="12.5" y="8"   width="7"   height="5.5" rx="1.5" fill="white"/>

  <!-- Column 3 — two cards (Done) -->
  <rect x="21"   y="8"   width="7.5" height="5.5" rx="1.5" fill="white"/>
  <rect x="21"   y="15"  width="7.5" height="5.5" rx="1.5" fill="rgba(255,255,255,0.6)"/>

  <!-- Sparkle / idea dot on first card -->
  <circle cx="7.25" cy="22.5" r="1.2" fill="rgba(255,255,255,0.35)"/>
</svg>
